<!DOCTYPE html>

  <head>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/skillsPage.css" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skills</title>
    <script
      type="text/javascript"
      src="https://www.gstatic.com/charts/loader.js"
    ></script>
    <script type="text/javascript">
      google.charts.load("current", { packages: ["corechart", "bar"] });
      google.charts.setOnLoadCallback(drawBasic);

      function drawBasic() {
        var data = google.visualization.arrayToDataTable([
          ["Skills", "Expertise", { role: "style" }, { role: "annotation" }],
          [
            "Java",
            80,
            "color: orange; stroke-color: black",
            "Java programming",
          ],
          [
            "Python",
            80,
            "color: yellow; stroke-color: black",
            "Python programming",
          ],
          ["C", 70, "color: lightgray; stroke-color: black", "C programming"],
          ["CPP", 60, "color: gray; stroke-color: black", "CPP"],
          ["SQL", 80, "color: violet; stroke-color: black", "DBMS/SQL"],
          [
            "Android",
            50,
            "color: green; stroke-color: black",
            "Flutter/Android development",
          ],
          ["HTML", 70, "color:orange; stroke-color: black", "HTML"],
          ["CSS", 70, "color:white; stroke-color: black", "CSS"],
          ["JS", 50, "color:green; stroke-color: black", "JavaScript"],
        ]);

        var options = {
          annotations: {},
          backgroundColor: '#f1f1f1',
          chartArea: { width: "80%", height: "90%"},
          animation: { duration: 900, easingL: "out", startup: true },
          hAxis: {
            minValue: 0,
            maxValue: 100,
          },
        };

        var chart = new google.visualization.BarChart(
          document.getElementById("chart_div")
        );

        chart.draw(data, options);
      }
    </script>
  </head>
